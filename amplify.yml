# Single Amplify app: legacy HTML at domain root, Next static exports under /b and /c.
# See README.md — hosting is static only (no Next SSR on Amplify compute for b/c).
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd b && npm ci
        - cd ../c && npm ci
    build:
      commands:
        - chmod +x scripts/build-site.sh
        - ./scripts/build-site.sh
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - b/node_modules/**/*
      - c/node_modules/**/*
